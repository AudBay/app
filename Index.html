    const set    = (f,v) => setForm(p=>({...p,[f]:v}));
    const setEar = (ear,f,v) => setForm(p=>({...p,[ear]:{...p[ear],[f]:v}}));

    const valid = form.clientName && form.testDate && form.audiologistName &&
      form.leftEar.level && form.leftEar.type && form.rightEar.level && form.rightEar.type && form.manufacturer;

    const mfr = MFR[form.manufacturer] || null;
    const dateStr = form.testDate
      ? new Date(form.testDate+"T12:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})
      : "";

    const hasLeft  = form.leftEar.level  && form.leftEar.level  !== "Normal";
    const hasRight = form.rightEar.level && form.rightEar.level !== "Normal";
    const count    = (hasLeft?1:0) + (hasRight?1:0);
    const recText  = count===2 ? "Hearing aids are recommended for both ears based on your assessment."
      : count===1 ? "A hearing aid is recommended for your "+(hasLeft?"left":"right")+" ear based on your assessment."
      : "No hearing aids are currently recommended. Annual monitoring is advised.";

    return (
      <>
        <style>{`
          *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
          body { font-family: system-ui, sans-serif; background: #f0eaf7; color: #1a1a2e; }
          .mfr-btn { padding: 14px 10px; border-radius: 9px; border: 2px solid #e2e8f0; background: white; cursor: pointer; text-align: center; width: 100%; transition: border-color 0.15s; }
          .mfr-btn.sel { border-color: #4a2060; background: #f3edf8; }
          .gen-btn { width: 100%; padding: 14px; background: #4a2060; color: white; border: none; border-radius: 9px; font-size: 15px; font-weight: 700; cursor: pointer; }
          .gen-btn:disabled { background: #ccc; cursor: not-allowed; }
          .seg-btn { padding: 6px 11px; border-radius: 14px; font-size: 12px; font-weight: 500; border: 1.5px solid #e2e8f0; background: white; color: #6b7280; cursor: pointer; }
          .seg-btn.sl { color: white; border-color: transparent; }
          .seg-btn.st { background: #f3edf8; border-color: #6b3a8a; color: #6b3a8a; font-weight: 600; }
        `}</style>

        <div style={{ minHeight:"100vh" }}>
          <div className="no-print" style={{ background:"#4a2060", padding:"15px 24px", display:"flex", alignItems:"center", gap:14 }}>
            <img src={LOGO_SRC} alt="Bayfields Opticians and Audiologists" style={{ height:44, width:"auto", background:"white", borderRadius:8, padding:"4px 10px", objectFit:"contain" }} />
            <div style={{ fontFamily:"Georgia,serif", color:"white", fontSize:19, fontWeight:700 }}>Hearing Assessment Report Tool</div>
          </div>

          <div className="no-print" style={{ background:"white", borderBottom:"1px solid #e2e8f0", display:"flex", padding:"0 24px" }}>
            {["form", done&&"preview"].filter(Boolean).map(t=>(
              <button key={t} onClick={()=>setTab(t)} style={{ padding:"12px 18px", fontSize:13, fontWeight:600, background:"none", border:"none",
                borderBottom: tab===t?"2.5px solid #4a2060":"2.5px solid transparent",
                color: tab===t?"#4a2060":"#6b7280", cursor:"pointer" }}>
                {t==="form"?"📋  Assessment Form":"📄  PDF Preview"}
              </button>
            ))}
          </div>

          {tab==="form" && (
            <div style={{ maxWidth:720, margin:"0 auto", padding:"26px 20px", display:"flex", flexDirection:"column", gap:18 }}>
              <Card icon="👤" title="Client & Clinic Details">
                <div style={{ display:"grid", gridTemplateColumns:"110px 1fr", gap:13 }}>
                  <div>
                    <div style={{ fontSize:11, fontWeight:700, color:"#6b7280", textTransform:"uppercase", letterSpacing:0.5, marginBottom:5 }}>Title</div>
                    <Select value={form.title} onChange={e=>set("title",e.target.value)}>{TITLES.map(t=><option key={t}>{t}</option>)}</Select>
                  </div>
                  <div>
                    <div style={{ fontSize:11, fontWeight:700, color:"#6b7280", textTransform:"uppercase", letterSpacing:0.5, marginBottom:5 }}>Client Full Name *</div>
                    <Input placeholder="e.g. Margaret Collins" value={form.clientName} onChange={e=>set("clientName",e.target.value)} />
                  </div>
                  <div style={{ gridColumn:"1/-1", display:"grid", gridTemplateColumns:"1fr 1fr", gap:13 }}>
                    <div>
                      <div style={{ fontSize:11, fontWeight:700, color:"#6b7280", textTransform:"uppercase", letterSpacing:0.5, marginBottom:5 }}>Client ID</div>
                      <Input placeholder="e.g. BAY-00123" value={form.clientId} onChange={e=>set("clientId",e.target.value)} />
                    </div>
                    <div>
                      <div style={{ fontSize:11, fontWeight:700, color:"#6b7280", textTransform:"uppercase", letterSpacing:0.5, marginBottom:5 }}>Test Date *</div>
                      <Input type="date" value={form.testDate} onChange={e=>set("testDate",e.target.value)} />
                    </div>
                  </div>
                  <div style={{ gridColumn:"1/-1" }}>
                    <div style={{ fontSize:11, fontWeight:700, color:"#6b7280", textTransform:"uppercase", letterSpacing:0.5, marginBottom:5 }}>Audiologist Name *</div>
                    <Input placeholder="e.g. Dr. Sarah O'Brien" value={form.audiologistName} onChange={e=>set("audiologistName",e.target.value)} />
                  </div>
                </div>
              </Card>

              <Card icon="📊" title="Hearing Test Results">
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
                  {[["leftEar","left","Left Ear"],["rightEar","right","Right Ear"]].map(([key,side,label])=>(
                    <div key={key} style={{ border:"1.5px solid #e2e8f0", borderRadius:9, overflow:"hidden" }}>
                      <div style={{ padding:"9px 13px", fontWeight:700, fontSize:12, background:side==="left"?"#e8f0fb":"#fdeee3", color:side==="left"?"#1565c0":"#b85c1a" }}>{label}</div>
                      <div style={{ padding:13, display:"flex", flexDirection:"column", gap:12 }}>
                        <div>
                          <div style={{ fontSize:10, fontWeight:700, color:"#6b7280", textTransform:"uppercase", letterSpacing:0.5, marginBottom:7 }}>Degree of Loss *</div>
                          <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
                            {LOSS_LEVELS.map(l=>(
                              <button key={l} className={"seg-btn "+(form[key].level===l?"sl":"")}
                                style={form[key].level===l?{backgroundColor:LOSS_COLORS[l]}:{}}
                                onClick={()=>setEar(key,"level",l)}>{l}</button>
                            ))}
                          </div>
                        </div>
                        <div>
                          <div style={{ fontSize:10, fontWeight:700, color:"#6b7280", textTransform:"uppercase", letterSpacing:0.5, marginBottom:7 }}>Type of Loss *</div>
                          <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
                            {LOSS_TYPES.map(t=>(
                              <button key={t} className={"seg-btn "+(form[key].type===t?"st":"")}
                                onClick={()=>setEar(key,"type",t)}>{t}</button>
                            ))}
                          </div>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </Card>

              <Card icon="🎧" title="Recommended Manufacturer *">
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:10 }}>
                  {MANUFACTURERS.map(m=>(
                    <button key={m} className={"mfr-btn "+(form.manufacturer===m?"sel":"")} onClick={()=>set("manufacturer",m)}>
                      <div style={{ fontWeight:700, fontSize:13, color:form.manufacturer===m?"#4a2060":"#1a1a2e", marginBottom:4 }}>{m}</div>
                      <div style={{ fontSize:10, color:"#6b7280" }}>{MFR[m].known}</div>
                    </button>
                  ))}
                </div>
              </Card>

              <Card icon="📝" title="Audiologist Notes" optional>
                <textarea placeholder="e.g. Client reports difficulty in noisy environments." value={form.notes}
                  onChange={e=>set("notes",e.target.value)}
                  style={{ width:"100%", minHeight:72, padding:"9px 12px", border:"1.5px solid #e2e8f0", borderRadius:6, fontSize:13, fontFamily:"inherit", color:"#1a1a2e", background:"#f7f4fa", resize:"vertical" }} />
              </Card>

              <button className="gen-btn" disabled={!valid} onClick={()=>{ setDone(true); setTab("preview"); }}>📄 Generate PDF Report</button>
            </div>
          )}

          {tab==="preview" && done && (
            <div className="preview-shell" style={{ padding:"20px 16px", display:"flex", flexDirection:"column", alignItems:"center", gap:16, background:"#cfc0e0" }}>
              <div className="no-print" style={{ display:"flex", gap:10 }}>
                <button onClick={()=>window.print()} style={{ background:"#4a2060", color:"white", border:"none", borderRadius:8, padding:"10px 22px", fontSize:14, fontWeight:700, cursor:"pointer" }}>🖨️ Print / Save as PDF</button>
                <button onClick={()=>setTab("form")} style={{ background:"white", color:"#4a2060", border:"1px solid #d4b8e8", borderRadius:8, padding:"10px 18px", fontSize:13, cursor:"pointer" }}>← Edit Form</button>
              </div>

              <div className="pdf-page" style={{ background:"white", display:"flex", flexDirection:"column", width:"210mm", minHeight:"297mm", boxShadow:"0 4px 28px rgba(0,0,0,0.22)" }}>

                <div style={{ background:"#4a2060", padding:"10px 22px", flexShrink:0 }}>
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                    <img src={LOGO_SRC} alt="Bayfields" style={{ height:48, width:"auto", background:"white", borderRadius:7, padding:"4px 10px", objectFit:"contain", flexShrink:0 }} />
                    <div style={{ flex:1, textAlign:"center" }}>
                      <div style={{ fontFamily:"Georgia,serif", color:"white", fontSize:20, fontWeight:700, marginBottom:5 }}>Hearing Assessment Report</div>
                      <div style={{ display:"flex", justifyContent:"center", gap:24, color:"rgba(255,255,255,0.75)", fontSize:10, flexWrap:"wrap" }}>
                        <span><strong style={{ color:"white" }}>Client:</strong> {form.title} {form.clientName}</span>
                        <span><strong style={{ color:"white" }}>Date:</strong> {dateStr}</span>
                        <span><strong style={{ color:"white" }}>Audiologist:</strong> {form.audiologistName}</span>
                        {form.clientId && <span><strong style={{ color:"white" }}>ID:</strong> {form.clientId}</span>}
                      </div>
                    </div>
                    <div style={{ width:52 }} />
                  </div>
                </div>
                <GoldBar />

                <div style={{ padding:"13px 20px 14px", flex:1, display:"flex", flexDirection:"column", gap:11 }}>

                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:11 }}>
                    <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
                      <SectionTitle>Your Hearing Test Results</SectionTitle>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:7 }}>
                        <EarCard level={form.leftEar.level} type={form.leftEar.type} side="left" label="Left Ear" />
                        <EarCard level={form.rightEar.level} type={form.rightEar.type} side="right" label="Right Ear" />
                      </div>
                      <div style={{ background:"#fff8e1", border:"1px solid #f0c96e", borderRadius:6, padding:"6px 10px", fontSize:11, color:"#5a3e00", lineHeight:1.5 }}>
                        <strong>Summary:</strong> {recText}
                      </div>
                      {form.notes && (
                        <div>
                          <SectionTitle mb={4}>Audiologist Notes</SectionTitle>
                          <div style={{ background:"#f8fafc", border:"1px solid #e2e8f0", borderRadius:6, padding:"6px 10px", fontSize:11, color:"#2d3748", lineHeight:1.5, whiteSpace:"pre-wrap" }}>{form.notes}</div>
                        </div>
                      )}
                    </div>

                    <div>
                      <SectionTitle>Understanding Your Hearing Loss</SectionTitle>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6 }}>
                        {[
                          ["What causes it?","Most hearing loss is sensorineural, caused by gradual wear to the delicate hair cells inside the inner ear. This process is painless and often goes unnoticed for years."],
                          ["Can it worsen?","Untreated hearing loss tends to progress over time. The sooner you act, the better your long-term hearing health will be."],
                          ["How aids help","Modern hearing aids amplify and clarify sound in real time, making conversation feel effortless — even in busy or noisy environments."],
                          ["The cognitive link","Research shows that treating hearing loss significantly reduces the risk of cognitive decline, depression, and social isolation."]
                        ].map(([t,b])=>(
                          <div key={t} style={{ background:"#f3edf8", borderRadius:6, padding:"7px 9px", border:"1px solid #d4b8e8" }}>
                            <div style={{ fontWeight:700, fontSize:11, color:"#4a2060", marginBottom:3 }}>{t}</div>
                            <div style={{ fontSize:10.5, color:"#4a5568", lineHeight:1.4 }}>{b}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>

                  <div>
                    <SectionTitle>Key Facts About Hearing Health</SectionTitle>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:7 }}>
                      {HEARING_FACTS.map((f,i)=>(
                        <div key={i} style={{ background:"linear-gradient(135deg,#fdf8ff,#f3edf8)", border:"1px solid #d4b8e8", borderRadius:7, padding:"8px 10px", borderTop:"3px solid #6b3a8a" }}>
                          <div style={{ fontSize:18, marginBottom:4 }}>{f.icon}</div>
                          <div style={{ fontWeight:700, fontSize:10.5, color:"#4a2060", marginBottom:4, lineHeight:1.3 }}>{f.title}</div>
                          <div style={{ fontSize:10, color:"#4a5568", lineHeight:1.4 }}>{f.body}</div>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:11 }}>
                    {mfr && (
                      <div style={{ display:"flex", flexDirection:"column" }}>
                        <SectionTitle>Your Recommended Brand</SectionTitle>
                        <div style={{ border:"1.5px solid #c9a84c", borderRadius:8, overflow:"hidden", background:"#fdf8ee", flex:1 }}>
                          <div style={{ background:"#c9a84c", padding:"6px 12px" }}>
                            <div style={{ fontFamily:"Georgia,serif", fontSize:14, fontWeight:700, color:"#4a2060" }}>{form.manufacturer} {count===1?"Hearing Aid":"Hearing Aids"}</div>
                            <div style={{ fontSize:10, color:"rgba(74,32,96,0.75)" }}>{mfr.tagline}</div>
                          </div>
                          <div style={{ padding:"8px 12px" }}>
                            <div style={{ fontSize:11, color:"#2d3748", lineHeight:1.5, fontStyle:"italic", marginBottom:6, paddingBottom:6, borderBottom:"1px solid #e8d89a" }}>{mfr.why}</div>
                            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"4px 10px" }}>
                              {mfr.highlights.map((h,i)=>(
                                <div key={i} style={{ display:"flex", alignItems:"flex-start", gap:6, fontSize:10.5, color:"#2d3748" }}>
                                  <div style={{ width:4, height:4, borderRadius:"50%", background:"#c9a84c", marginTop:4, flexShrink:0 }} />
                                  <span>{h}</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        </div>
                      </div>
                    )}

                    <div style={{ display:"flex", flexDirection:"column" }}>
                      <SectionTitle>Your Next Steps</SectionTitle>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6, flex:1 }}>
                        {NEXT_STEPS.map((s,i)=>(
                          <div key={i} style={{ background:"#f3edf8", borderRadius:7, padding:"8px 10px", borderLeft:"3px solid #4a2060", display:"flex", flexDirection:"column" }}>
                            <div style={{ fontSize:18, marginBottom:3 }}>{s.icon}</div>
                            <div style={{ fontWeight:700, fontSize:11, color:"#4a2060", marginBottom:3 }}>{s.title}</div>
                            <div style={{ fontSize:10.5, color:"#4a5568", lineHeight:1.4 }}>
                              {s.title==="Connect Member Offer"
                                ? <span>Become a Connect Member to receive <strong>£150</strong> off your new aids.</span>
                                : s.desc}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>

                  <div style={{ background:"#4a2060", borderRadius:8, padding:"9px 16px", display:"flex", alignItems:"center", justifyContent:"space-between", flexShrink:0 }}>
                    <div>
                      <div style={{ fontFamily:"Georgia,serif", color:"white", fontSize:13, fontWeight:700, marginBottom:2 }}>Your hearing. Your future. Our commitment.</div>
                      <div style={{ color:"rgba(255,255,255,0.7)", fontSize:10.5, lineHeight:1.4 }}>This report is confidential and prepared exclusively for you. Our team is dedicated to supporting your hearing health every step of the way.</div>
                    </div>
                    <div style={{ color:"rgba(255,255,255,0.35)", fontSize:9, textAlign:"right" }}>Hearing Assessment Report<br/>Confidential — {dateStr}</div>
                  </div>

                </div>
              </div>
            </div>
          )}
        </div>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  </body>
  </html>
